## Phase 3: PROVENANCE.yaml schema for asset bundles under store/corpus/artifacts/.
## Every asset bundle root (store/corpus/artifacts/prs/<repo>/PR-<N>/,
## store/corpus/artifacts/contests/<contest>/<problem>/submissions/<rank-N-author>/,
## store/corpus/artifacts/blogs/<slug>/code/, store/corpus/artifacts/kernels/<slug>/full/,
## store/corpus/artifacts/kernels/<slug>/variants/) has exactly one PROVENANCE.yaml at its root.
artifact-bundle-provenance:
  required:
    - origin_url
    - upstream_repo
    - license
    - retrieved_at
    - asset_mode
    - files
  optional:
    - upstream_sha
    - derived_from
    - size_cap_truncated
    - license_notice
  constraints:
    asset_mode: [verbatim, extracted, derived]
    derived_from_required_when: "asset_mode == derived"
    upstream_sha_required_when: "asset_mode == verbatim"
  files_schema:
    required:
      - local_path
      - role
      - mode
      - sha256
    optional:
      - upstream_path
      - heading_path
      - size_cap_truncated
    constraints:
      role: [pr-diff, upstream-file, extracted-block, derived-source, approach-notes, bench-record]
      mode: [verbatim, extracted, derived, upstream-patch]
      upstream_path_required_when: "mode in [verbatim, extracted] and upstream_sha present"
      heading_path_required_when: "mode == extracted"

## Phase 3: inclusion-policy.yaml schema
## Defines how PRs from store/docs/ledgers/cute-dsl-universe.yaml and
## store/docs/ledgers/triton-universe.yaml are classified for capture.
inclusion-policy:
  required:
    - cute-dsl
    - triton
  lane_schema:
    required:
      - description
      - capture_criteria
      - skip_criteria
    optional:
      - examples

## Phase 3: core-prs.yaml schema (auto-generated by scripts/compute_core_prs.py)
## Ordered, deterministic, content-checksum-verified list of included PR IDs.
## The generator intentionally does NOT emit a `generated_at` timestamp,
## because byte-stable reproducibility across days is a guaranteed property
## of the output (see the module docstring + scripts/verify_core_prs.py).
core-prs:
  required:
    - generated_by
    - checksum_sha256
    - sources
    - prs
  prs_schema:
    required:
      - id
      - source_of_inclusion
    optional:
      - skipped_reason
    constraints:
      source_of_inclusion: [wiki-graph-closure, contest-reference, cute-dsl-tutorial, triton-in-policy, allowlist]

## Phase 4: version_sensitive frontmatter pointer (per-page side of the
## hybrid registry per DEC-1). When a wiki/reference page makes a tool-version
## dependent capability claim, it carries a `version_sensitive` block whose
## `id` resolves to an entry in store/state/versions/version-claims.yaml.
version-sensitive-pointer:
  required:
    - id
  optional:
    - tool
    - claim_valid_for
    - last_verified_release
    - last_verified_at
  constraints:
    id_prefix: vs-

## Phase 4: store/state/versions/version-claims.yaml registry (central side of the hybrid
## registry per DEC-1). Every entry is a complete claim record; pages refer
## to it via their `version_sensitive: <id>` pointer. The validator enforces
## bidirectional consistency: every per-page pointer must resolve here, and
## every entry's `applies_to` paths must exist + carry the matching pointer.
version-claims-registry:
  required:
    - claims
  claim_schema:
    required:
      - id
      - tool
      - claim_valid_for
      - last_verified_release
      - last_verified_at
      - applies_to
      - source_ids
    optional:
      - dev_branch_sha
      - notes
    constraints:
      tool: [triton, cutlass, cuda, ptx, cute-dsl, cutile, tilelang, tilus, jax-pallas]
      applies_to_required_min: 1
      source_ids_required_min: 1
      id_prefix: vs-
      dev_branch_sha_required_when: "claim_valid_for contains 'dev'"

## Phase 4: store/state/versions/tool-versions.yaml snapshot (deterministic offline source
## of "release of record" for tracked tools). Read by
## scripts/kbs.py check freshness and the validator's CUTLASS pinning rule.
tool-versions-snapshot:
  required:
    - tools
  tool_schema:
    required:
      - tool
      - releases
    constraints:
      tool: [triton, cutlass, cuda, ptx, cute-dsl, cutile, tilelang, tilus, jax-pallas]
  release_schema:
    required:
      - name
      - released_at
      - channel
    optional:
      - release_notes_url
      - dev_branch_sha
      - evidence_source_ids
      - notes
    constraints:
      channel: [stable, rc, dev]
      dev_branch_sha_required_when: "channel == dev"

## Phase 4: pr-page-skipped.yaml audit (per AC-4). Generated by
## scripts/update_pr_corpus.py for every eligible row that does not produce a
## store/docs/sources/prs/<repo>/PR-<N>.md page.
##
## Stage values (matches plan-phase4.md::AC-4 strictly):
##   pre-fetch          -> gh PR fetch returned no data
##   is-kernel-related  -> file-allowlist check excluded the PR
##
## A historical `bootstrap-uncaptured` stage was used in Round 4 R4-8 as a
## transient closure for the FlashInfer Jan->Apr coverage gap. Round 5 R5-2
## reclassified FlashInfer + cutlass + pytorch entries; Round 6 R6-1
## drained the remaining sglang + vllm entries. The vocabulary is now back
## to the plan-text taxonomy.
pr-page-skipped-audit:
  required:
    - rows
  row_schema:
    required:
      - pr_id
      - repo
      - pr_number
      - stage
      - reason
      - recorded_at
    constraints:
      stage: [pre-fetch, is-kernel-related]
  constraints:
    sort_order: "rows sorted by (repo, pr_number) ascending; byte-stable across re-runs"

## Phase 4: store/state/refresh/refresh-cutoff.yaml (per AC-5). Single-field record of the
## refresh cutoff date used by scripts/refresh_candidate_ledger.py.
refresh-cutoff:
  required:
    - cutoff_date
  optional:
    - notes

## Phase 4: store/state/refresh/refresh-search-results.yaml (per AC-5). Per-repo search
## results from scripts/refresh_candidate_ledger.py. Byte-stable for
## identical query inputs.
refresh-search-results:
  required:
    - cutoff_date
    - repos
  repo_schema:
    required:
      - repo_slug
      - searched_at
      - cutoff_date_used
      - pr_numbers_seen
      - last_pr_date_seen
    constraints:
      pr_numbers_seen_sort: "ascending integers"
