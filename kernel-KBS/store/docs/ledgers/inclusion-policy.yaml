## Inclusion Policy for Phase 3 Code Capture
## Consumed by scripts/compute_core_prs.py
##
## Two separate lanes (CuTe DSL and Triton) are classified with different
## criteria because Triton on SM100 has no direct tcgen05/TMEM access
## (see wiki/languages/triton-blackwell.md), so Triton's useful scope is
## narrower than CuTe DSL's.

cute-dsl:
  description: |
    CuTe DSL is a first-class Blackwell code lane. Every PR tagged cute-dsl
    (in tags or languages) that touches kernel or example directories is
    captured. CuTe DSL tutorial PRs are captured even when the PR is
    primarily documentation, because the tutorial code itself is the
    teaching material.

  capture_criteria:
    # PR must satisfy at least one of these
    - languages_contains: cute-dsl
    - tags_contains: cute-dsl
    # Policy moved to scripts/compute_core_prs.py apply_cute_dsl_policy
    # (two-tier STRONG_CUTE_GLOBS + KERNEL_OR_EXAMPLE_GLOBS lists) after
    # R27 widening. The YAML block below documents intent; the code is
    # source-of-truth. fnmatch `**` matching requires both top-level and
    # `**/`-prefixed variants (BL-20260417-skip-globs-fnmatch-depth).
    #
    # Strong cute/cutedsl signals (path-only capture is allowed):
    #   cute/** + **/cute/**
    #   cute_dsl/** + **/cute_dsl/**
    #   **/cutlass.cute.**
    #   examples/cute_dsl/** + **/examples/cute_dsl/**
    #   examples/python/CuTeDSL/** + **/examples/python/CuTeDSL/**
    #   tools/cute/** + **/tools/cute/**
    #   **/*cutedsl*.py  (flashinfer_cutedsl_moe.py, cutedsl_kda.py)
    #   **/*cutedsl*.cu
    #
    # Generic kernel/example signals (only count as kernel authorship
    # when the PR is already cute-dsl-tagged; path-only capture NOT
    # allowed so untagged cuda-cpp CUTLASS examples don't pollute the
    # cute-dsl lane):
    #   examples/**/*.{cu,cuh,hpp} + **/examples/**/*.{cu,cuh,hpp}
    - changed_paths_match_documented_in: "scripts/compute_core_prs.py (R27 two-tier globs)"

  skip_criteria:
    # Even when capture_criteria matches, skip if
    - changed_paths_match_only:
        - "docs/**"
        - "**/CHANGELOG*"
        - "**/release_notes*"
    # R19 tightening: language/tag alone is insufficient. If a PR is
    # flagged cute-dsl only via metadata (languages or tags) and none of
    # its changed_paths match the kernel/example globs above, skip it.
    # Previously pr-vllm-39644 (only `tests/kernels/moe/test_cutedsl_moe.py`)
    # was captured and shipped an empty bundle after SKIP_GLOBS.
    - language_tag_only_without_kernel_path: true

  examples:
    captured:
      - "pr-cutlass-3106"  # CuTe DSL tutorial / tutorial-fix PRs
    skipped:
      - "PRs that only touch CUTLASS docs and happen to mention CuTe"

triton:
  description: |
    Triton is a scoped Blackwell lane. As of Triton 3.6 (released
    2026-01-21), Triton has native SM100 lowering through tcgen05 + TMEM
    via descriptor/TMA + warp_specialize, tl.dot_scaled, and Gluon
    multi-CTA / 2CTA, but production peak-performance leadership for
    compute-bound matmul/attention on Blackwell still favors hand-written
    CuTe-DSL / CUTLASS / FA-4 / TRT-LLM kernels for many workloads
    (downstream evidence: pr-sglang-5390 measured CUTLASS tcgen05_mla
    ~27% faster than the Triton MLA decode baseline; pr-sglang-21595
    moved Blackwell datacenter multimodal attention default away from
    triton_attn). We therefore capture Triton PRs in three sub-scopes
    that remain genuinely useful on Blackwell rather than mirroring the
    full CuTe-DSL lane.

    See store/state/versions/version-claims.yaml::vs-triton-3.6-blackwell-tcgen05
    for the version-sensitive claim record this rationale references.

  capture_criteria:
    # PR must satisfy at least one of these sub-scopes
    - sub_scope: memory-bound-kernel
      match:
        languages_contains: triton
        symptoms_intersects: [memory-bound, low-sm-utilization]
    - sub_scope: sm100-integration
      match:
        languages_contains: triton
        architectures_contains: sm100
        # Directory-scoped patterns catch files under a triton/ or
        # triton_kernels/ tree. The basename-scoped patterns catch Triton
        # backend-dispatch files (e.g. vllm/v1/attention/backends/
        # triton_attn.py, vllm/v1/attention/ops/triton_reshape_and_cache_
        # flash.py) that live outside any triton/ directory but are
        # unambiguously Triton code. Widened in Round 17 after Codex
        # flagged pr-vllm-37940 as a concrete miss.
        changed_paths_match:
          - "**/triton_kernels/**"
          - "**/triton/**"
          - "**/triton_*.py"
          - "**/*_triton.py"
          - "**/*_triton_*.py"
    - sub_scope: backend-fallback
      match:
        languages_contains: triton
        # Match spaced and hyphenated wording variants because upstream
        # titles routinely use "Fall back to triton MOE"
        # (pr-sglang-21780) alongside the compound "fallback". Widened in
        # Round 17.
        description_contains_any:
          - "fallback"
          - "fall back"
          - "fall-back"
          - "falls back"
          - "falling back"
          - "SM100 path"
          - "when cuBLAS/CUTLASS is unavailable"

  skip_criteria:
    - pure_hopper_only: "languages_contains triton AND architectures_contains_only sm90"
    - runtime_config_only: "changed_paths_match_only ['**/config/**', '**/__init__.py']"
    # R19 tightening: benchmark-only PRs produce empty bundles after
    # SKIP_GLOBS in fetch_pr_diff.py, so drop them before they enter the
    # captured core set. Concrete miss fixed: pr-sglang-20305, whose
    # every changed_path was under benchmark/kernels/.
    - benchmark_only: "changed_paths_match_only ['benchmark/**', '**/benchmark/**', 'benchmarks/**', '**/benchmarks/**', 'bench/**', '**/bench/**']"

  examples:
    captured:
      - "Triton PRs delivering FP8 memory-bound attention on B200"
      - "Triton PRs wiring new SM100 backend dispatch"
    skipped:
      - "Pure SM90/Hopper Triton tuning PRs with no Blackwell relevance"
      - "Triton runtime config-file-only PRs"
