## Core PR Allowlist (human-justified deltas on top of automation)
##
## scripts/compute_core_prs.py derives the core PR set deterministically via:
##   wiki-graph-closure ∪ contest-reference ∪ cute-dsl-tutorial ∪ triton-in-policy
## This file records explicit human-justified additions or exclusions on top of
## that derivation. Each entry MUST have a one-sentence justification.
##
## Validator rule (task3): scripts/validate.py rejects modifications to
## data/core-prs.yaml that are not backed by a corresponding entry here,
## so the derivation stays reproducible.

schema_version: 1

additions:
  # Format:
  # - pr: pr-<repo>-<N>
  #   reason: <one-sentence why this PR must be captured despite not meeting automation criteria>
  #   added_at: YYYY-MM-DD
  #   added_by: <handle>

exclusions:
  # Format:
  # - pr: pr-<repo>-<N>
  #   reason: <one-sentence why this PR should NOT be captured despite meeting automation criteria>
  #   excluded_at: YYYY-MM-DD
  #   excluded_by: <handle>
