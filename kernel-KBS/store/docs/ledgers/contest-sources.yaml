## Contest submission sources manifest
## Consumed by scripts/collect_contest_code.py
##
## Keys use the exact slug format that the collector derives:
##   rank-<rank>-<lowercased participant with non-alphanumeric runs → "-">
## e.g. "Simon (veitner)" → rank-1-simon-veitner
##
## kind ∈ { github-file, inline-from-blog, discord-only, unavailable-public }

gpu-mode-nvfp4:
  problem-1-gemv:
    rank-1-simon-veitner:
      kind: inline-from-blog
      blog_slug: simon-nvfp4-gemv
      # File list after R35 heuristic tightening re-dropped the
      # single-line "core computation" formula fence (no code-structure
      # signal). The three C++ strategy fences returned to indices
      # 01-03 because the formula fence was previously shifting them
      # to 02-04 under R20's permissive heuristic.
      files:
        - "01-reference-core-computation-part-1.cpp"
        - "02-strategy-1-k-parallel-grid-with-atomic-accumulation.cpp"
        - "03-strategy-3-atomic-free-shared-memory-reduction.cpp"
      # R21: canonical_file names the actual final/winning kernel so the
      # contest page's `code_path` lands on the real submission instead
      # of the first file in the progression (which is a reference /
      # baseline fragment). Strategy-3 (atomic-free shared-memory
      # reduction) is the final approach described in Simon's blog.
      canonical_file: "03-strategy-3-atomic-free-shared-memory-reduction.cpp"
      origin_url: "https://veitner.bearblog.dev/nvfp4-gemv/"
    rank-2-yue:
      kind: inline-from-blog
      blog_slug: yue-nvfp4-hackathon
      files:
        - "01-step-1-cute-dsl-baseline-100us.cpp"
        - "02-step-2-coalesced-memory-access-443us-then-improved.cpp"
        - "03-step-3-hardware-intrinsics-39us.cpp"
        - "04-step-4-ptx-assembly-27us.ptx"
        - "05-step-5-ilp-optimization-22-9us.cpp"
      # R21: Yue's winning 22.4us geomean kernel is the ILP-optimized
      # final stage from his blog's performance progression table
      # (step 1: 100us -> step 5: 22.9us).
      canonical_file: "05-step-5-ilp-optimization-22-9us.cpp"
      origin_url: "https://yue-zhang-2025.github.io/2025/12/02/blackwell-nvfp4-kernel-hackathon-journey.html"
    rank-3-amandeep:
      kind: discord-only
      origin_url: "https://discord.gg/gpumode"
      reason: "Amandeep's PTX-level per-K specialization kernel was shared in the GPU Mode Discord problem-1 thread; author has not republished to a public platform at collection time"

  problem-2-gemm:
    rank-1-simon-veitner:
      kind: discord-only
      origin_url: "https://discord.gg/gpumode"
      reason: "Simon's NVFP4 GEMM winning submission posted in the GPU Mode Discord problem-2 thread; author has not republished the GEMM variant on a public platform"
    rank-2-yue:
      kind: discord-only
      origin_url: "https://discord.gg/gpumode"
      reason: "Yue's NVFP4 GEMM submission posted in the GPU Mode Discord problem-2 thread; the public hackathon blog covers GEMV (problem 1), not problem-2 GEMM"
    rank-3-currybab:
      kind: discord-only
      origin_url: "https://discord.gg/gpumode"
      reason: "currybab's submission posted in the GPU Mode Discord problem-2 thread; no public author republish at collection time"

  problem-3-gated-dual-gemm:
    rank-1-simon-veitner:
      kind: discord-only
      origin_url: "https://discord.gg/gpumode"
      reason: "Simon's gated-dual-GEMM winning submission posted in the GPU Mode Discord problem-3 thread; not republished publicly"
    rank-2-yue:
      kind: discord-only
      origin_url: "https://discord.gg/gpumode"
      reason: "Yue's gated-dual-GEMM submission posted in the GPU Mode Discord problem-3 thread; blog covers problem-1 progression, not this problem"
    rank-3-currybab:
      kind: discord-only
      origin_url: "https://discord.gg/gpumode"
      reason: "currybab's gated-dual-GEMM submission posted in the GPU Mode Discord problem-3 thread; no public republish at collection time"

  problem-4-grouped-gemm:
    rank-1-reward-hack-invalidated:
      kind: unavailable-public
      origin_url: "https://discord.gg/gpumode"
      reason: "Problem-4 rank-1 slot was invalidated after a reward-hacking incident; no legitimate kernel was archived, so there is no code to collect"
    rank-2-simon-veitner:
      kind: discord-only
      origin_url: "https://discord.gg/gpumode"
      reason: "Simon's grouped-GEMM submission posted in the GPU Mode Discord problem-4 thread; not republished publicly"
    rank-3-currybab:
      kind: discord-only
      origin_url: "https://discord.gg/gpumode"
      reason: "currybab's grouped-GEMM submission posted in the GPU Mode Discord problem-4 thread; no public republish at collection time"

