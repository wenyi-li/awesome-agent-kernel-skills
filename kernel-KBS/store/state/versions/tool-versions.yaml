## Tool releases of record for the version-sensitive registry.
## Read by scripts/kbs.py check freshness and the validator's
## DEC-4 CUTLASS pinning rule. Schema: store/schemas/page-schemas.yaml
## :: tool-versions-snapshot.
##
## This file is deterministic and offline; entries are populated
## from upstream release notes captured via Codex consult, never
## from live network queries at validation time. Adding/updating
## entries requires a fresh Codex consult to confirm release name +
## date + channel.
##
## "needs-verification" sentinels mark fields the current refresh
## round did not authoritatively pin; future refresh rounds should
## replace them. The validator (task5) does not reject
## needs-verification entries, but kbs.py check freshness
## flags them as advisory warnings.

tools:
  - tool: triton
    releases:
      - name: "3.6.0"
        released_at: "2026-01-21"
        channel: stable
        release_notes_url: "https://github.com/triton-lang/triton/releases/tag/v3.6.0"
        evidence_source_ids:
          - doc-triton-3.6-blackwell
          - pr-sglang-22079
          - pr-sglang-21019
        notes: |
          First Triton release with native Blackwell tcgen05 + TMEM lowering
          infrastructure. Strongest user-visible Blackwell paths: descriptor/TMA
          warp-specialized matmul, Gluon multi-CTA / 2CTA, tl.dot_scaled / block
          scaled. See store/docs/ledgers/triton-3.6-evidence.md for the per-pathway breakdown.
      - name: "3.5.1"
        released_at: "2025-11-12"
        channel: stable
        release_notes_url: "https://github.com/triton-lang/triton/releases/tag/v3.5.1"
        notes: |
          Last 3.5.x patch before the 3.6 Blackwell story. Pages with
          version_sensitive claims valid for ">=3.5,<3.6" should pin to this
          release.

  - tool: cutlass
    releases:
      - name: "4.5.0"
        released_at: "2026-03-27"
        channel: stable
        evidence_source_ids:
          - doc-cutlass-changelog-sm100
        notes: |
          Most recent CUTLASS stable release as of 2026-04-27. Wiki pages
          with confidence: verified that mention CUTLASS 4.x SHOULD pin to
          4.5.0 unless they specifically depend on a feature that arrived
          in a later patch.
      - name: "4.4.2"
        released_at: "2026-03-13"
        channel: stable
        evidence_source_ids:
          - doc-cutlass-changelog-sm100
        notes: |
          Last 4.4.x patch before 4.5.0.
      - name: "4.4.0"
        released_at: "2026-02-14"
        channel: stable
        evidence_source_ids:
          - doc-cutlass-changelog-sm100
        notes: |
          4.4.0 minor release.
      - name: "4.3.0"
        released_at: "2025-11-21"
        channel: stable
        evidence_source_ids:
          - doc-cutlass-changelog-sm100
        notes: |
          Pre-Blackwell-tutorial-rewrite era reference release.
      - name: "3.8.0"
        released_at: "2025-01-15"
        channel: stable
        evidence_source_ids:
          - doc-cutlass-changelog-sm100
        notes: |
          First CUTLASS release with Blackwell support. Some legacy wiki
          pages reference "CUTLASS 3.x for SM100" (e.g. wiki/hardware/clc.md);
          those should be reconciled to a current 4.x stable release in task12.
          Date approximate from doc-cutlass-changelog-sm100 ("January 2025,
          first Blackwell support").

  - tool: cuda
    releases:
      - name: "13.1"
        released_at: "needs-verification"
        channel: stable
        evidence_source_ids:
          - doc-cuda-13
          - doc-cutile-python-dsl
        notes: |
          Introduced cuTile Python DSL (see sources/docs/cutile-python-dsl.md).
          Driver requirement R580 minimum, R590 for tile profiling. Exact
          release date pending future refresh-round capture.
      - name: "13.0"
        released_at: "needs-verification"
        channel: stable
        evidence_source_ids:
          - doc-cuda-13
          - pr-pytorch-175826
        notes: |
          PyTorch inductor B200/SM100 lane was moved to 13.0 in pr-pytorch-175826
          (cited as ecosystem-readiness anchor in store/docs/ledgers/triton-3.6-evidence.md).
          Exact release date pending future refresh-round capture.
      - name: "12.8"
        released_at: "needs-verification"
        channel: stable
        evidence_source_ids:
          - doc-cuda-13
          - pr-pytorch-150705
        notes: |
          First CUDA toolkit with full Blackwell/sm100 support. Required for
          PyTorch's vec128 vectorized loads (pr-pytorch-150705). Exact
          release date pending future refresh-round capture.
