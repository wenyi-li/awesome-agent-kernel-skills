## Phase 3 Definition-of-Done fixtures (AC-7 immutable contract)
## Consumed by scripts/kbs.py check fixtures
##
## Per-glob semantics (Round 2+):
##   - Every required_assets glob must match at least one file INDEPENDENTLY.
##   - The line-count floor, per-file mode, bundle-level asset_mode, and
##     content regex gates are applied per glob (not over the union) where
##     applicable.
##
## Each fixture also encodes the plan's intended evidence strength:
##   - required_min_lines         : absolute line-count floor
##   - required_provenance_modes  : allowed per-file mode set (files[*].mode
##                                  in the file's bundle PROVENANCE.yaml)
##   - required_bundle_asset_mode : allowed bundle-level asset_mode (top-level
##                                  PROVENANCE.yaml asset_mode) — distinct
##                                  from per-file mode so a fixture can demand
##                                  "at least one verbatim bundle" for a given
##                                  glob
##   - required_content_patterns  : case-insensitive regex set applied across
##                                  the combined matched set

fixtures:
  - question: "How do I write an NVFP4 batched GEMV on B200?"
    required_assets:
      # Canonical kernel must be ≥200 lines (the plan's evidence floor).
      - glob: "store/corpus/artifacts/kernels/nvfp4-gemv/full/nvfp4_scaled_mm_kernels.cu"
        min_lines: 200
      # Contest-reconstructed progression provides the hackathon-winning path.
      # Individual extracted snippets are small; the floor here is just
      # "non-empty", enforced by the default 20-line floor.
      - glob: "store/corpus/artifacts/contests/gpu-mode-nvfp4/problem-1-gemv/submissions/rank-2-yue/*.cpp"
        min_lines: 8
    required_min_lines: 200
    required_provenance_modes: [verbatim, extracted]
    required_bundle_asset_mode: [verbatim, extracted]
    required_content_patterns:
      - "nvfp4|fp4|e2m1"

  - question: "How is warp specialization structured on Blackwell (producer / consumer / epilogue)?"
    required_assets:
      - "store/corpus/artifacts/kernels/warp-specialization/full/sm100_fmha_fwd_mainloop_tma_warpspecialized.hpp"
    required_min_lines: 500
    required_provenance_modes: [verbatim]
    required_bundle_asset_mode: [verbatim]
    required_content_patterns:
      - "pipeline|mbarrier|producer|consumer"

  - question: "How does DeepGEMM do Nc=128 CUDA-core promotion for FP8 accumulation?"
    required_assets:
      - "store/corpus/artifacts/kernels/deepgemm/full/sm90_fp8_gemm_1d1d.cuh"
    required_min_lines: 200
    required_provenance_modes: [verbatim]
    required_bundle_asset_mode: [verbatim]
    required_content_patterns:
      - "wgmma|promote|cuda.?core"

  - question: "How does CUTLASS configure PersistentScheduler + CLC (Cluster Launch Control) on SM100?"
    required_assets:
      - "store/corpus/artifacts/prs/cutlass/PR-2161/diff.patch"
      - "store/corpus/artifacts/prs/cutlass/PR-2161/key-files/**/*"
    required_min_lines: 40
    required_provenance_modes: [verbatim, upstream-patch]
    required_bundle_asset_mode: [verbatim]
    required_content_patterns:
      - "grid_dependency_control|GDC|griddepcontrol"

  - question: "How does FlashAttention-4 implement software-emulated exponential and softmax rescaling?"
    required_assets:
      - "store/corpus/artifacts/kernels/flash-attention-4/full/sm100_fmha_bwd_mla_kernel_tma_warpspecialized.hpp"
      - "store/corpus/artifacts/blogs/flash-attention-4/code/01-software-exp-cody-waite-horner.cu"
    required_min_lines: 20
    required_provenance_modes: [verbatim, extracted]
    required_bundle_asset_mode: [verbatim, extracted]
    required_content_patterns:
      - "exp2?|rescale|softmax|cody.waite|horner"
