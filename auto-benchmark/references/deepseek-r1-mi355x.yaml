# DeepSeek R1 671B — Full-node MI355X (8×gfx950), ROCm 7.2
# Resource class: full-node
# Docker: rocm/sgl-dev:v0.5.9-rocm720-mi35x-20260317
# Uses FP8 KV cache + aiter AllReduce fusion for large MoE model

server:
  launch: true
  host: 127.0.0.1
  port: 30000
  env:
    HIP_VISIBLE_DEVICES: "0,1,2,3,4,5,6,7"
    SGLANG_USE_AITER: "1"
    SGLANG_AITER_MLA_PERSIST: "1"
    SGLANG_AITER_FP8_PREFILL_ATTN: "1"
  base_flags:
    model_path: /data/deepseek-ai/DeepSeek-R1
    tp_size: 8
    trust_remote_code: true
    mem_fraction_static: 0.88
    kv_cache_dtype: fp8_e4m3
    enable_aiter_allreduce_fusion: true
  search_space:
    mem_fraction_static: [0.85, 0.88, 0.90]
    attention_backend: [aiter]
    chunked_prefill_size: [8192, 16384, 131072]
    max_running_requests: [16, 32, 48]
    schedule_policy: [lpm, fcfs]

dataset:
  kind: sharegpt
  path: ""
  num_prompts: 800
  output_len: 1024

benchmark:
  backend: auto
  tokenizer: /data/deepseek-ai/DeepSeek-R1
  max_concurrency: [null, 4, 8]
  extra_request_body:
    temperature: 0.0
  qps:
    lower: 0.2
    upper: 3.0
    tolerance: 0.05
  sla:
    max_ttft_ms: 5000
    max_tpot_ms: 60
  output_dir: ./auto_benchmark_results/deepseek-r1-mi355x

search:
  tier: 2
  max_candidates: 16
