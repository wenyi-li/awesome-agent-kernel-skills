# Qwen3 32B — 4-GPU MI355X (gfx950), ROCm 7.2
# Resource class: multi-gpu
# Docker: rocm/sgl-dev:v0.5.9-rocm720-mi35x-20260317

server:
  launch: true
  host: 127.0.0.1
  port: 30000
  env:
    HIP_VISIBLE_DEVICES: "0,1,2,3"
    SGLANG_USE_AITER: "1"
  parallel:
    tp: [4, 2]
    # dp_size auto-derived: 4 GPUs / tp → dp_size = 1 or 2
  base_flags:
    model_path: /data/Qwen/Qwen3-32B
    tp_size: 4
    trust_remote_code: true
    mem_fraction_static: 0.85
  search_space:
    mem_fraction_static: [0.82, 0.85, 0.88]
    attention_backend: [aiter, triton]
    chunked_prefill_size: [4096, 8192, 16384]
    max_running_requests: [64, 96, 128]
    schedule_policy: [lpm, fcfs]
    num_continuous_decode_steps: [1, 3]

dataset:
  kind: sharegpt
  path: ""
  num_prompts: 1200
  output_len: 256

benchmark:
  backend: auto
  tokenizer: /data/Qwen/Qwen3-32B
  max_concurrency: [null, 16, 32]
  extra_request_body:
    temperature: 0.0
  qps:
    lower: 1.0
    upper: 14.0
    tolerance: 0.1
  sla:
    max_ttft_ms: 1500
    max_tpot_ms: 30
  output_dir: ./auto_benchmark_results/qwen3-32b-mi355x

search:
  tier: 2
  max_candidates: 24
