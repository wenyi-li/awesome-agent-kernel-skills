server:
  launch: true
  host: 127.0.0.1
  port: 30000
  env:
    HIP_VISIBLE_DEVICES: "0,1,2,3"
    SGLANG_USE_AITER: "1"
  # Optional parallel search sugar:
  # parallel:
  #   tp: [4, 2]    # test tp4dp1 first, then tp2dp2 on 4 visible GPUs
  #   # pp_size: [1, 2]
  base_flags:
    # Replace with a local model path (prefer /data/ over NFS).
    model_path: Qwen/Qwen3-32B
    tp_size: 4
    trust_remote_code: true
    mem_fraction_static: 0.85
  # AMD/ROCm attention backends: aiter, triton, torch_native
  # Do NOT use fa3, flashinfer, or other NVIDIA-specific backends.
  search_space:
    mem_fraction_static: [0.82, 0.85, 0.88]
    attention_backend: [aiter, triton]
    chunked_prefill_size: [4096, 8192]
    max_running_requests: [64, 96, 128]
    schedule_policy: [lpm, fcfs]

dataset:
  kind: sharegpt
  # Leave empty to auto-download ShareGPT.
  path: ""
  num_prompts: 1200
  output_len: 256

benchmark:
  backend: auto
  tokenizer: Qwen/Qwen3-32B
  max_concurrency: [null, 16, 32]
  extra_request_body:
    temperature: 0.0
  qps:
    lower: 1.0
    upper: 12.0
    tolerance: 0.1
  sla:
    max_ttft_ms: 1500
    max_tpot_ms: 30
  output_dir: ./auto_benchmark_results/qwen3-32b-rocm

search:
  tier: 2
  max_candidates: 24

speculative:
  enabled: false
  algorithm: EAGLE
  draft_model_path: ""
  search_space:
    speculative_num_steps: [3, 5]
    speculative_eagle_topk: [1, 4]
    speculative_num_draft_tokens: [4, 8]
